<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#18202b">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#28313d"/>
    </marker>
    <marker id="arrowEnc" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d6f9f"/>
    </marker>
    <marker id="arrowDec" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f7d44"/>
    </marker>
    <marker id="arrowCross" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b35454"/>
    </marker>

    <linearGradient id="encTint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="decTint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2faee"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="bridgeTint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1f1"/>
      <stop offset="1" stop-color="#fffafa"/>
    </linearGradient>

    <style>
      .title { font-size: 19px; font-weight: 700; }
      .subtitle { font-size: 12px; fill: #5b6675; }
      .laneTitle { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
      .slotTitle { font-size: 11.4px; font-weight: 700; }
      .small { font-size: 10.5px; fill: #5d6674; }
      .tiny { font-size: 9.2px; fill: #667180; }
      .micro { font-size: 8.3px; fill: #667180; }
      .math { font-style: italic; }
      .chipText { font-size: 8.2px; font-weight: 600; }
      .flow { fill: none; stroke: #28313d; stroke-width: 1.5; marker-end: url(#arrow); }
      .encFlow { fill: none; stroke: #2d6f9f; stroke-width: 1.6; marker-end: url(#arrowEnc); }
      .decFlow { fill: none; stroke: #4f7d44; stroke-width: 1.6; marker-end: url(#arrowDec); }
      .crossFlow { fill: none; stroke: #b35454; stroke-width: 1.7; marker-end: url(#arrowCross); }
      .ghostFlow { fill: none; stroke: #9aa5b3; stroke-width: 1.0; stroke-dasharray: 4 4; }
      .card { fill: #ffffff; stroke: #dbe3ed; stroke-width: 1; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" class="title">Searchable Transformer Encoder-Decoder Block</text>
  <text x="460" y="54" text-anchor="middle" class="subtitle">DARTS alpha slots over tokenization, positional bias, attention kernels, cross-attention, and FFN variants</text>

  <!-- Topology strip -->
  <g transform="translate(48,76)">
    <rect x="0" y="0" width="824" height="44" rx="8" fill="#fff8e6" stroke="#d3aa40" stroke-width="1.1"/>
    <rect x="14" y="10" width="92" height="24" rx="12" fill="#7a6120"/>
    <text x="60" y="26" text-anchor="middle" fill="#ffffff" class="chipText">TOPOLOGY m</text>
    <text x="124" y="18" class="small" fill="#6e5a1f">enc-dec shown</text>
    <text x="124" y="34" class="tiny" fill="#6e5a1f">outer search can choose encoder-only or decoder-only; GDAS may sample one active choice per slot during search</text>
  </g>

  <!-- Main block -->
  <g transform="translate(48,142)">
    <rect x="0" y="0" width="824" height="398" rx="14" class="card"/>
    <text x="412" y="25" text-anchor="middle" class="small" font-weight="700" fill="#323b49">coloured modules denote mixed-operation alpha slots; white modules are deterministic residual or normalization steps</text>
    <line x1="20" y1="43" x2="804" y2="43" stroke="#d8dee8" stroke-width="1"/>

    <!-- Encoder lane -->
    <g transform="translate(28,64)">
      <rect x="0" y="0" width="292" height="300" rx="12" fill="url(#encTint)" stroke="#c6dced" stroke-width="1.1"/>
      <text x="146" y="24" text-anchor="middle" class="laneTitle" fill="#255f8c">ENCODER</text>
      <text x="146" y="42" text-anchor="middle" class="tiny">x[1:L] -> memory H_enc</text>

      <!-- input tokens -->
      <g transform="translate(26,60)">
        <rect x="0" y="0" width="94" height="28" rx="4" fill="#e5f0fa" stroke="#2d6f9f"/>
        <rect x="10" y="7" width="8" height="14" fill="#9cc5e7"/>
        <rect x="23" y="7" width="8" height="14" fill="#9cc5e7"/>
        <rect x="36" y="7" width="8" height="14" fill="#9cc5e7"/>
        <rect x="49" y="7" width="8" height="14" fill="#9cc5e7"/>
        <rect x="62" y="7" width="8" height="14" fill="#9cc5e7"/>
        <rect x="75" y="7" width="8" height="14" fill="#9cc5e7"/>
        <text x="47" y="42" text-anchor="middle" class="micro" fill="#255f8c">multivariate tokens</text>
      </g>

      <!-- tokenizer slot -->
      <g class="slot" transform="translate(154,54)">
        <rect x="0" y="0" width="112" height="46" rx="7" fill="#fff2df" stroke="#d28a45" stroke-width="1.2"/>
        <text x="56" y="16" text-anchor="middle" class="slotTitle" fill="#8a5522">Patch tokenizer</text>
        <g transform="translate(9,24)">
          <rect x="0" y="0" width="26" height="14" rx="3" fill="#ffe1bd" stroke="#d28a45"/>
          <text x="13" y="10" text-anchor="middle" class="chipText" fill="#754513">8</text>
          <rect x="33" y="0" width="28" height="14" rx="3" fill="#ffe1bd" stroke="#d28a45"/>
          <text x="47" y="10" text-anchor="middle" class="chipText" fill="#754513">16</text>
          <rect x="68" y="0" width="28" height="14" rx="3" fill="#ffe1bd" stroke="#d28a45"/>
          <text x="82" y="10" text-anchor="middle" class="chipText" fill="#754513">32</text>
        </g>
      </g>
      <path d="M120 74 L150 74" class="encFlow"/>

      <!-- position slot -->
      <g class="slot" transform="translate(58,118)">
        <rect x="0" y="0" width="176" height="44" rx="7" fill="#f8effb" stroke="#9a6ca7" stroke-width="1.2"/>
        <text x="88" y="16" text-anchor="middle" class="slotTitle" fill="#62436d">Positional bias phi</text>
        <g transform="translate(19,25)">
          <rect x="0" y="0" width="30" height="13" rx="3" fill="#ead8ef" stroke="#9a6ca7"/>
          <text x="15" y="9.5" text-anchor="middle" class="chipText" fill="#62436d">RoPE</text>
          <rect x="35" y="0" width="30" height="13" rx="3" fill="#ead8ef" stroke="#9a6ca7"/>
          <text x="50" y="9.5" text-anchor="middle" class="chipText" fill="#62436d">ALiBi</text>
          <rect x="70" y="0" width="28" height="13" rx="3" fill="#ead8ef" stroke="#9a6ca7"/>
          <text x="84" y="9.5" text-anchor="middle" class="chipText" fill="#62436d">none</text>
          <rect x="103" y="0" width="34" height="13" rx="3" fill="#ead8ef" stroke="#9a6ca7"/>
          <text x="120" y="9.5" text-anchor="middle" class="chipText" fill="#62436d">season</text>
        </g>
      </g>
      <path d="M210 100 L210 116" class="encFlow"/>

      <!-- self attention -->
      <g class="slot" transform="translate(38,184)">
        <rect x="0" y="0" width="216" height="58" rx="8" fill="#fff0f0" stroke="#bd6363" stroke-width="1.3"/>
        <text x="108" y="16" text-anchor="middle" class="slotTitle" fill="#853b3b">Self-attention kernel</text>
        <g transform="translate(16,26)">
          <rect x="0" y="0" width="30" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="15" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">SDP</text>
          <rect x="36" y="0" width="28" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="50" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">Lin</text>
          <rect x="70" y="0" width="42" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="91" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">ProbS</text>
          <rect x="118" y="0" width="30" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="133" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">Cos</text>
          <rect x="154" y="0" width="30" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="169" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">Local</text>
        </g>
        <text x="108" y="50" text-anchor="middle" class="micro math" fill="#853b3b">Attn(Q,K,V; phi)</text>
      </g>
      <path d="M146 162 L146 182" class="encFlow"/>

      <g transform="translate(72,252)">
        <rect x="0" y="0" width="148" height="24" rx="6" fill="#ffffff" stroke="#a9b5c2"/>
        <text x="74" y="16" text-anchor="middle" class="tiny" fill="#344052">Add + RMSNorm</text>
      </g>
      <path d="M146 242 L146 250" class="encFlow"/>

      <g transform="translate(112,292)">
        <rect x="0" y="0" width="68" height="24" rx="12" fill="#2d6f9f"/>
        <text x="34" y="16" text-anchor="middle" fill="#ffffff" class="chipText">H_enc</text>
      </g>
      <path d="M146 276 L146 290" class="encFlow"/>
    </g>

    <!-- Cross-attention bridge -->
    <g transform="translate(346,125)">
      <rect x="0" y="0" width="132" height="168" rx="13" fill="url(#bridgeTint)" stroke="#bd6363" stroke-width="1.4"/>
      <text x="66" y="22" text-anchor="middle" class="laneTitle" fill="#853b3b">CROSS</text>
      <text x="66" y="39" text-anchor="middle" class="laneTitle" fill="#853b3b">ATTENTION</text>
      <line x1="18" y1="49" x2="114" y2="49" stroke="#efc6c6"/>
      <text x="66" y="66" text-anchor="middle" class="slotTitle" fill="#853b3b">Bridge slot</text>
      <g transform="translate(15,78)">
        <rect x="0" y="0" width="30" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
        <text x="15" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">none</text>
        <rect x="36" y="0" width="28" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
        <text x="50" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">SDP</text>
        <rect x="70" y="0" width="30" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
        <text x="85" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">Lin</text>
        <rect x="0" y="21" width="42" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
        <text x="21" y="31.5" text-anchor="middle" class="chipText" fill="#853b3b">ProbS</text>
        <rect x="48" y="21" width="28" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
        <text x="62" y="31.5" text-anchor="middle" class="chipText" fill="#853b3b">Cos</text>
        <rect x="82" y="21" width="26" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
        <text x="95" y="31.5" text-anchor="middle" class="chipText" fill="#853b3b">Loc</text>
      </g>
      <text x="66" y="130" text-anchor="middle" class="tiny math" fill="#853b3b">Q_dec x K,V_enc</text>
      <text x="66" y="146" text-anchor="middle" class="micro" fill="#853b3b">cross-pos: RoPE / ALiBi</text>
      <text x="66" y="158" text-anchor="middle" class="micro" fill="#853b3b">none / seasonal</text>
    </g>

    <!-- Decoder lane -->
    <g transform="translate(504,64)">
      <rect x="0" y="0" width="292" height="300" rx="12" fill="url(#decTint)" stroke="#ccdfc2" stroke-width="1.1"/>
      <text x="146" y="24" text-anchor="middle" class="laneTitle" fill="#4f7d44">DECODER</text>
      <text x="146" y="42" text-anchor="middle" class="tiny">shifted targets -> forecast y_hat[1:H]</text>

      <!-- shifted decoder queries -->
      <g transform="translate(26,60)">
        <rect x="0" y="0" width="94" height="28" rx="4" fill="#e8f3df" stroke="#4f7d44"/>
        <rect x="10" y="7" width="8" height="14" fill="#a8cc94"/>
        <rect x="23" y="7" width="8" height="14" fill="#a8cc94"/>
        <rect x="36" y="7" width="8" height="14" fill="#a8cc94"/>
        <rect x="49" y="7" width="8" height="14" fill="#a8cc94"/>
        <rect x="62" y="7" width="8" height="14" fill="#a8cc94"/>
        <rect x="75" y="7" width="8" height="14" fill="#ffffff" stroke="#9aa5b3" stroke-dasharray="2 2"/>
        <text x="47" y="42" text-anchor="middle" class="micro" fill="#4f7d44">masked query tokens</text>
      </g>

      <!-- decoder position -->
      <g class="slot" transform="translate(128,54)">
        <rect x="0" y="0" width="154" height="46" rx="7" fill="#f8effb" stroke="#9a6ca7" stroke-width="1.2"/>
        <text x="77" y="16" text-anchor="middle" class="slotTitle" fill="#62436d">Positional phi</text>
        <g transform="translate(11,25)">
          <rect x="0" y="0" width="30" height="13" rx="3" fill="#ead8ef" stroke="#9a6ca7"/>
          <text x="15" y="9.5" text-anchor="middle" class="chipText" fill="#62436d">RoPE</text>
          <rect x="35" y="0" width="30" height="13" rx="3" fill="#ead8ef" stroke="#9a6ca7"/>
          <text x="50" y="9.5" text-anchor="middle" class="chipText" fill="#62436d">ALiBi</text>
          <rect x="70" y="0" width="28" height="13" rx="3" fill="#ead8ef" stroke="#9a6ca7"/>
          <text x="84" y="9.5" text-anchor="middle" class="chipText" fill="#62436d">none</text>
          <rect x="103" y="0" width="34" height="13" rx="3" fill="#ead8ef" stroke="#9a6ca7"/>
          <text x="120" y="9.5" text-anchor="middle" class="chipText" fill="#62436d">season</text>
        </g>
      </g>
      <path d="M120 74 L124 74" class="decFlow"/>

      <!-- masked self attention -->
      <g class="slot" transform="translate(38,124)">
        <rect x="0" y="0" width="216" height="58" rx="8" fill="#fff0f0" stroke="#bd6363" stroke-width="1.3"/>
        <text x="108" y="16" text-anchor="middle" class="slotTitle" fill="#853b3b">Masked self-attention</text>
        <g transform="translate(16,26)">
          <rect x="0" y="0" width="30" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="15" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">SDP</text>
          <rect x="36" y="0" width="28" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="50" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">Lin</text>
          <rect x="70" y="0" width="42" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="91" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">ProbS</text>
          <rect x="118" y="0" width="30" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="133" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">Cos</text>
          <rect x="154" y="0" width="30" height="15" rx="3" fill="#ffdada" stroke="#bd6363"/>
          <text x="169" y="10.5" text-anchor="middle" class="chipText" fill="#853b3b">Local</text>
        </g>
        <text x="108" y="50" text-anchor="middle" class="micro math" fill="#853b3b">causal mask</text>
      </g>
      <path d="M205 100 L146 122" class="decFlow"/>

      <g transform="translate(72,196)">
        <rect x="0" y="0" width="148" height="24" rx="6" fill="#ffffff" stroke="#a9b5c2"/>
        <text x="74" y="16" text-anchor="middle" class="tiny" fill="#344052">Add + RMSNorm</text>
      </g>
      <path d="M146 182 L146 194" class="decFlow"/>

      <!-- FFN slot -->
      <g class="slot" transform="translate(38,238)">
        <rect x="0" y="0" width="216" height="50" rx="8" fill="#f3fbe9" stroke="#86a55d" stroke-width="1.3"/>
        <text x="108" y="16" text-anchor="middle" class="slotTitle" fill="#4f6a35">Feed-forward variant</text>
        <g transform="translate(12,26)">
          <rect x="0" y="0" width="45" height="15" rx="3" fill="#e1efd2" stroke="#86a55d"/>
          <text x="22.5" y="10.5" text-anchor="middle" class="chipText" fill="#4f6a35">SwiGLU</text>
          <rect x="52" y="0" width="45" height="15" rx="3" fill="#e1efd2" stroke="#86a55d"/>
          <text x="74.5" y="10.5" text-anchor="middle" class="chipText" fill="#4f6a35">GeGLU</text>
          <rect x="104" y="0" width="43" height="15" rx="3" fill="#e1efd2" stroke="#86a55d"/>
          <text x="125.5" y="10.5" text-anchor="middle" class="chipText" fill="#4f6a35">ReLU^2</text>
          <rect x="154" y="0" width="38" height="15" rx="3" fill="#e1efd2" stroke="#86a55d"/>
          <text x="173" y="10.5" text-anchor="middle" class="chipText" fill="#4f6a35">MoE</text>
        </g>
      </g>
      <path d="M146 220 L146 236" class="decFlow"/>

      <g transform="translate(106,308)">
        <rect x="0" y="0" width="80" height="24" rx="12" fill="#4f7d44"/>
        <text x="40" y="16" text-anchor="middle" fill="#ffffff" class="chipText">y_hat</text>
      </g>
      <path d="M146 288 L146 306" class="decFlow"/>
    </g>

    <!-- Cross paths outside inner groups, positioned for clarity -->
    <path d="M208 356 C255 356, 291 292, 346 250" class="crossFlow"/>
    <text x="286" y="337" text-anchor="middle" class="tiny math" fill="#2d6f9f">K,V from H_enc</text>
    <path d="M552 217 C526 217, 504 216, 478 216" class="crossFlow"/>
    <text x="515" y="205" text-anchor="middle" class="tiny math" fill="#b35454">Q_dec</text>
    <path d="M478 262 C520 274, 548 275, 576 272" class="crossFlow"/>
    <text x="526" y="292" text-anchor="middle" class="tiny math" fill="#b35454">context c_ctx</text>
    <path d="M650 246 L650 258" class="decFlow"/>

    <!-- Search note -->
    <g transform="translate(346,315)">
      <rect x="0" y="0" width="132" height="50" rx="10" fill="#ffffff" stroke="#dbe3ed"/>
      <text x="66" y="16" text-anchor="middle" class="tiny" font-weight="700" fill="#344052">Search semantics</text>
      <text x="66" y="31" text-anchor="middle" class="micro" fill="#667180">soft mix while searching</text>
      <text x="66" y="43" text-anchor="middle" class="micro" fill="#667180">argmax when finalized</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(48,558)">
    <rect x="0" y="0" width="824" height="40" rx="9" fill="#ffffff" stroke="#dbe3ed"/>
    <text x="16" y="25" class="small" font-weight="700" fill="#344052">Slot families</text>

    <rect x="118" y="14" width="14" height="12" rx="2" fill="#fff2df" stroke="#d28a45"/>
    <text x="138" y="24" class="small">patch tokenizer</text>
    <rect x="262" y="14" width="14" height="12" rx="2" fill="#f8effb" stroke="#9a6ca7"/>
    <text x="282" y="24" class="small">positional bias</text>
    <rect x="406" y="14" width="14" height="12" rx="2" fill="#fff0f0" stroke="#bd6363"/>
    <text x="426" y="24" class="small">attention kernels</text>
    <rect x="566" y="14" width="14" height="12" rx="2" fill="#f3fbe9" stroke="#86a55d"/>
    <text x="586" y="24" class="small">FFN variants</text>
    <line x1="682" y1="20" x2="710" y2="20" stroke="#b35454" stroke-width="1.7" marker-end="url(#arrowCross)"/>
    <text x="720" y="24" class="small">cross-attn flow</text>
  </g>
</svg>
