name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "web/**"
      - "foreblocks/studio/**"
      - "build_studio_web.sh"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "web/**"
      - "foreblocks/studio/**"
      - "build_studio_web.sh"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material

      - name: Build docs under /docs
        run: mkdocs build --strict

      - name: Assemble root landing page
        run: |
          cp web/index.html site/index.html
          cp web/logo.svg site/logo.svg
          cp -R web/imgs site/imgs
          if [ -f web/CNAME ]; then cp web/CNAME site/CNAME; fi
          if [ -d web/studio ]; then cp -a web/studio site/studio; fi
          touch site/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
