name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "web/**"
      - "package.json"
      - "package-lock.json"
      - "foreblocks/studio/**"
      - "build_studio_web.sh"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "web/**"
      - "package.json"
      - "package-lock.json"
      - "foreblocks/studio/**"
      - "build_studio_web.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync web version from pyproject.toml
        run: python scripts/update_web_version.py

      - name: Validate version sync on pull requests
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet -- web/version.js; then
            echo "web/version.js is out of sync with pyproject.toml"
            git --no-pager diff -- web/version.js
            exit 1
          fi

      - name: Commit synced web/version.js on push
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- web/version.js; then
            git add web/version.js
            git commit -m "chore: sync web/version.js with pyproject.toml"
            git push
          fi

      - name: Set up GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install docs dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build VitePress docs under /docs
        run: npm run docs:build

      - name: Assemble root landing page
        run: |
          mkdir -p site
          cp web/index.html site/index.html
          cp web/logo.svg site/logo.svg
          cp -R web/imgs site/imgs
          if [ -f web/CNAME ]; then cp web/CNAME site/CNAME; fi
          if [ -d web/studio ]; then cp -a web/studio site/studio; fi
          touch site/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
