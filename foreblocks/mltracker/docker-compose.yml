services:
  api:
    build:
      context: ../..
      dockerfile: foreblocks/mltracker/Dockerfile.dev-api
    container_name: foreblocks-mltracker-dev-api
    restart: unless-stopped
    environment:
      MLTRACKER_DIR: /data/mltracker
      PORT: "8000"
    ports:
      - "${MLTRACKER_PORT:-8000}:8000"
    volumes:
      - ../..:/app
      - ./mltracker_data:/data/mltracker
    command:
      [
        "uvicorn",
        "foreblocks.mltracker.api:app",
        "--reload",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]

  ui:
    image: node:20-slim
    container_name: foreblocks-mltracker-dev-ui
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5175:5175"
    working_dir: /app/foreblocks/mltracker/dashboard_v2
    volumes:
      - ../..:/app
    command: sh -c "cd /app/foreblocks/mltracker/dashboard_v2 && npm ci && npm run dev -- --host 0.0.0.0 --port 5175"
