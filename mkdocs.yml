site_name: foreBlocks
site_description: Modular time-series forecasting for PyTorch
site_url: https://foreblocks.laioseman.com/docs/
repo_url: https://github.com/lseman/foreblocks
repo_name: lseman/foreblocks
docs_dir: docs
site_dir: site/docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: black
      accent: teal

nav:
  - Home: index.md
  - Overview: overview.md
  - Tutorials:
      - Getting Started: getting-started.md
      - Train A Direct Model: tutorials/train-direct-model.md
      - Run A DARTS Search: tutorials/darts-multifidelity-search.md
      - Generate Synthetic Series: tutorials/generate-synthetic-series.md
      - Optimize With BOHB: tutorials/optimize-with-bohb.md
  - Guides:
      - Preprocessor: preprocessor.md
      - Custom Blocks: custom_blocks.md
      - Transformer: transformer.md
      - Mixture Of Experts: moe.md
      - DARTS: darts.md
      - Troubleshooting: troubleshooting.md
  - Foretools:
      - Foretools Overview: foretools/index.md
      - Time Series Generator: foretools/tsgen.md
      - BOHB Search: foretools/bohb.md
      - VMD Decomposition: foretools/vmd.md
  - Architecture:
      - System Overview: architecture/system-overview.md
      - Forecasting Pipeline: architecture/forecasting-pipeline.md
      - DARTS Search Pipeline: architecture/darts-pipeline.md
  - Reference:
      - Public API: reference/public-api.md
      - Configuration: reference/configuration.md
      - Repository Map: reference/repository-map.md
  - Contributing:
      - Documentation Workflow: contributing/docs-workflow.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
